<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка игры...</title>
    
    <link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==">
    
    <script>
        // Функция самоуничтожения (отправляет команду в МП на закрытие экрана)
        function selfDestruct() {
            const msg = JSON.stringify({ Type: "Close" });
            try {
                if (window.JSPostMessageInterface) {
                    window.JSPostMessageInterface.OnPostMessage(msg);
                }
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.JSPostMessageInterface) {
                    window.webkit.messageHandlers.JSPostMessageInterface.postMessage(msg);
                }
                window.postMessage(msg, "*");
            } catch (e) {
                console.error("Ошибка при закрытии", e);
            }
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('sessionId');
            
            if (!sessionId) {
                document.getElementById('status').innerText = "Ошибка: sessionId не найден";
                return;
            }

            const targetGameUrl = `https://gs:gs@front-preprod.ecom.auchan.ru/game/?sessionId=${sessionId}`;

            // 1. Мгновенно инициируем переход в системный браузер
            window.location.replace(targetGameUrl);

            // 2. Устанавливаем ловушки на ВОЗВРАТ в приложение
            // Как только пользователь закроет браузер и вернется в МП, 
            // WebView "проснется" и мгновенно выполнит команду закрытия.
            
            document.addEventListener("visibilitychange", function() {
                if (document.visibilityState === 'visible') {
                    selfDestruct();
                }
            });

            window.addEventListener("focus", function() {
                selfDestruct();
            });

            window.addEventListener("pageshow", function(event) {
                // Если страница загружается из кэша (возврат назад)
                if (event.persisted) {
                    selfDestruct();
                }
            });
        };
    </script>
</head>
<body style="background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif;">
    <h2 id="status">Открываем игру в браузере...</h2>
</body>
</html>
