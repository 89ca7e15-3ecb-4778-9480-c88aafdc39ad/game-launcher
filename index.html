<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Запуск игры...</title>
    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('sessionId');

            if (!sessionId) {
                document.body.innerHTML = "Ошибка: sessionId не найден";
                return;
            }

            const targetGameUrl = `https://gs:gs@front-preprod.ecom.auchan.ru/game/?sessionId=${sessionId}`;

            window.onload = function() {
  
                window.location.href = targetGameUrl;

                setTimeout(() => {
                    const message = JSON.stringify({ Type: "Close" });

                    if (window.JSPostMessageInterface && typeof window.JSPostMessageInterface.OnPostMessage === 'function') {
                        try {
                            window.JSPostMessageInterface.OnPostMessage(message);
                        } catch (e) {
                            console.error("Нативный интерфейс недоступен:", e);
                        }
                    } else {
                        window.postMessage(message, "*");
                    }
                }, 2000); 
            };
        })();
    </script>
</head>
<body style="background:#000; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; margin:0;">
    <div style="text-align:center;">
        <p>Запуск игры в браузере...</p>
    </div>
</body>
</html>
