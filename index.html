<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Запуск игры...</title>
    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('sessionId');
            if (!sessionId) return;

            const targetGameUrl = `https://gs:gs@front-preprod.ecom.auchan.ru/game/?sessionId=${sessionId}`;

            window.onload = function() {
                const closeMessage = JSON.stringify({ Type: "Close" });

                window.location.href = targetGameUrl;

                setTimeout(() => {
                    try {
                        if (window.JSPostMessageInterface) {
                            window.JSPostMessageInterface.OnPostMessage(closeMessage);
                        } else {
                            window.postMessage(closeMessage, "*");
                        }
                    } catch (e) {
                    }
                }, 300); 
            };
        })();
    </script>
</head>
<body style="background:#000; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; margin:0;">
    <p>Открываем игру...</p>
</body>
</html>
