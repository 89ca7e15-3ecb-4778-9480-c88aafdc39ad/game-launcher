<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auchan Game</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==">
    
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .btn { 
            background: #e30613; color: #fff; padding: 20px 30px; border-radius: 12px; 
            text-decoration: none; font-weight: bold; font-size: 18px; border: none; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        #status { margin-top: 20px; color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <button id="launchBtn" class="btn">ЗАПУСТИТЬ ИГРУ</button>
    <div id="status">Нажмите для перехода в Safari/Chrome</div>

    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('sessionId');
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            
            const btn = document.getElementById('launchBtn');
            const status = document.getElementById('status');

            if (!sessionId) {
                status.innerText = "Ошибка: сессия не найдена";
                btn.style.display = "none";
                return;
            }

            // Настраиваем финальную ссылку
            const finalUrl = isIOS 
                ? `https://front-preprod.ecom.auchan.ru/game/?sessionId=${sessionId}`
                : `https://gs:gs@front-preprod.ecom.auchan.ru/game/?sessionId=${sessionId}`;

            function closeWebView() {
                const msg = JSON.stringify({ Type: "Close" });
                try {
                    // Android мост
                    if (window.JSPostMessageInterface) {
                        window.JSPostMessageInterface.OnPostMessage(msg);
                    }
                    // Универсальный postMessage
                    window.postMessage(msg, "*");
                    // iOS мост
                    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.JSPostMessageInterface) {
                        window.webkit.messageHandlers.JSPostMessageInterface.postMessage(msg);
                    }
                } catch (e) {}
            }

            btn.onclick = function() {
                btn.style.display = "none";
                status.innerText = "Запускаем браузер...";

                // ШАГ 1: ВСЕГДА ПЕРВЫМ ИНИЦИИРУЕМ ПЕРЕХОД
                window.location.href = finalUrl;

                // ШАГ 2: ЗАКРЫВАЕМ ОКНО С ЗАДЕРЖКОЙ
                // На iOS нам нужно дать хотя бы секунду, чтобы Safari "подхватил" ссылку
                // На Android даем 2.5 секунды, чтобы избежать краша из-за смены контекста
                const delay = isIOS ? 1000 : 2500;

                setTimeout(() => {
                    status.innerText = "Закрываем окно...";
                    closeWebView();
                }, delay);
            };
        })();
    </script>
</body>
</html>
