<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Запуск игры...</title>
    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('sessionId');

            if (!sessionId) {
                document.body.innerHTML = "Ошибка: sessionId не найден";
                return;
            }

            const targetGameUrl = `https://gs:gs@front-preprod.ecom.auchan.ru/game/?sessionId=${sessionId}`;

            window.onload = function() {
                window.location.href = targetGameUrl;

                setTimeout(() => {
                    const message = JSON.stringify({ 
                        Type: "Close",     // Согласно вашему DTO в C#
                        action: "close"    // На всякий случай, если в iOS другая логика
                    });

                    console.log("Отправка команды на закрытие...");

                    try {
                        // Пытаемся закрыть через все возможные каналы
                        if (window.JSPostMessageInterface) {
                            window.JSPostMessageInterface.OnPostMessage(message);
                        }
                        window.postMessage(message, "*");
                        
                        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.JSPostMessageInterface) {
                            window.webkit.messageHandlers.JSPostMessageInterface.postMessage(message);
                        }
                    } catch (e) {
                        console.error(e);
                    }
                }, 2000);
            };
        })();
    </script>
</head>
<body style="background:#000; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">
    <div style="text-align:center;">
        <p>Открываем игру в Safari/Chrome...</p>
        <p style="font-size: 12px; color: #666;">Это окно закроется автоматически</p>
    </div>
</body>
</html>
