<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <script>
        // 1. МГНОВЕННЫЙ РЕДИРЕКТ. 
        // Выполняется в ту же миллисекунду, как браузер скачал эту строку кода.
        // Не ждем загрузки страницы!
        var searchString = window.location.search;
        
        // Убедитесь, что добавляете /game/ , если dostavka не добавляет его сама
        var targetUrl = "https://dostavka.auchan.ru/game/" + searchString; 
        
        // Делаем replace, чтобы батут не сохранялся в истории "Назад"
        window.location.replace(targetUrl);

        // 2. Фоновая логика закрытия WebView 
        // (Она останется в памяти старого WebView и сработает при возврате)
        var isClosing = false;
        function selfDestruct() {
            if (isClosing) return;
            isClosing = true;
            try {
                var msg = JSON.stringify({ Type: "Close" });
                if (window.JSPostMessageInterface) window.JSPostMessageInterface.OnPostMessage(msg);
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.JSPostMessageInterface) {
                    window.webkit.messageHandlers.JSPostMessageInterface.postMessage(msg);
                }
            } catch (e) {}
        }

        document.addEventListener("visibilitychange", function() { if (document.visibilityState === 'visible') selfDestruct(); });
        window.addEventListener("focus", selfDestruct);
        window.addEventListener("pageshow", function(e) { if (e.persisted) selfDestruct(); });
    </script>
    
    <title>Загрузка...</title>
</head>
<body style="background: #000;">
    </body>
</html>
