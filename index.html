<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка игры...</title>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .spinner { width: 40px; height: 40px; }
    </style>
    <script>
        function closeWebView() {
            const msg = JSON.stringify({ Type: "Close" });
            try {
                if (window.JSPostMessageInterface) {
                    window.JSPostMessageInterface.OnPostMessage(msg);
                }
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.JSPostMessageInterface) {
                    window.webkit.messageHandlers.JSPostMessageInterface.postMessage(msg);
                }
                window.postMessage(msg, "*");
            } catch (e) {
                console.error("Ошибка при закрытии", e);
            }
        }

        window.onload = function() {
            // 1. Берем текущие параметры (sessionId, channel и т.д.)
            let searchString = window.location.search;

            if (!searchString.includes('sessionId')) {
                console.error("Ошибка: sessionId не найден");
                return;
            }

            // 2. Добавляем магический параметр маршрутизации.
            // Для теста замените 'openinbrowser' на 'openinexternalwebview'
            const routingParam = 'openinbrowser'; // или 'openinexternalwebview'
            
            searchString = searchString ? searchString + '&' + routingParam : '?' + routingParam;

            // 3. Формируем итоговую ссылку
            const targetUrl = `https://www.auchan.ru/game/${searchString}`;

            // 4. Триггерим редирект. 
            // МП перехватит эту ссылку, увидит параметр и запустит нужный браузер.
            window.location.replace(targetUrl);

            // 5. Даем МП полсекунды на перехват ссылки, затем закрываем текущий WebView, 
            // чтобы под шторкой браузера не остался висеть пустой черный экран.
            setTimeout(() => {
                closeWebView();
            }, 500);
        };
    </script>
</head>
<body>
    <svg class="spinner" viewBox="0 0 50 50">
        <circle cx="25" cy="25" r="20" fill="none" stroke="#E6261F" stroke-width="5" stroke-dasharray="31.4 31.4" stroke-linecap="round">
            <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite"/>
        </circle>
    </svg>
</body>
</html>
